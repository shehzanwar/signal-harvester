watch_topics:
  - foundation model release
  - benchmark result
  - reasoning capability
  - multimodal AI
  - AI safety and alignment
  - open source model release
  - inference optimization
  - agentic AI
  - AI regulatory policy
  - compute efficiency

sentiment_target: "the pace of safe and beneficial AI capability development"

tiers:
  T1: >
    Major frontier model release (GPT, Claude, Gemini, Llama family milestones); new
    state-of-the-art result on a key benchmark by more than 5 percentage points; significant
    AI safety incident or near-miss; open-source release matching or exceeding closed-model
    capabilities; breakthrough research result with independent replication; major regulatory
    action or government AI policy with immediate effect.
  T2: >
    New model variant or fine-tune release with notable improvements; strong benchmark
    improvement in a specific domain; significant regulatory proposal or government report;
    important research paper with code release; efficiency improvement (inference speed, cost
    reduction, context length); influential dataset or evaluation release; notable lab hire or
    organizational change.
  T3: >
    Technical tutorial or blog post without new results; conference paper summaries; commentary
    and opinion on AI trends; application-level demos without novel capability; awards and
    rankings; retrospective analyses.

llm:
  model: qwen3:8b
  base_url: http://localhost:11434/v1
  num_ctx: 8192
  max_article_tokens: 3500

output:
  root: "output/ai-research"
  formats: [json, markdown]

schedule:
  interval: daily
