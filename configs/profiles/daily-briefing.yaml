profile: daily-briefing
dashboard_title: "Daily Briefing"

# Hard cap per feed — newest N entries only. Prevents high-frequency feeds
# from flooding the enrichment queue and turning a 20-min run into 2 hours.
# Override per-feed with max_articles: N for outliers.
